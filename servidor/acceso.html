<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catholizare Pro — Sistema de admisiones y evaluación</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy:   #001A55;
      --blue:   #0052CC;
      --gold:   #C9A84C;
      --white:  #FFFFFF;
      --gray-1: #F4F6FB;
      --gray-2: #E8ECF4;
      --gray-3: #9CA3B4;
      --gray-4: #5A6275;
      --red:    #D93025;
      --green:  #1A7F3C;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--gray-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ─── Card ─────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,26,85,0.10);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }

    /* ─── Header ────────────────────────────────────── */
    .card-header {
      background: linear-gradient(135deg, var(--navy) 0%, #003399 100%);
      padding: 36px 32px 30px;
      text-align: center;
    }
    .logo-mark {
      width: 60px; height: 60px;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(201,168,76,0.5);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
    }
    .card-header h1 {
      font-size: 22px; font-weight: 800;
      color: var(--white); letter-spacing: -0.3px;
    }
    .card-header p {
      font-size: 13px; color: rgba(255,255,255,0.65);
      margin-top: 6px; font-weight: 500;
    }

    /* ─── Body ──────────────────────────────────────── */
    .card-body { padding: 30px 32px 32px; }

    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 12px; font-weight: 700;
      color: var(--navy); letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .field input {
      width: 100%; padding: 14px 44px 14px 16px;
      border: 2px solid var(--gray-2); border-radius: 12px;
      font-family: 'Inter', monospace; font-size: 15px;
      font-weight: 500; color: var(--navy);
      background: var(--gray-1);
      letter-spacing: 0.5px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .field input:focus {
      outline: none; border-color: var(--blue);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(0,82,204,0.08);
    }
    .field input.is-error {
      border-color: var(--red);
      box-shadow: 0 0 0 4px rgba(217,48,37,0.08);
    }
    .field input::placeholder { color: var(--gray-3); font-weight: 400; letter-spacing: 0; }
    .eye-btn {
      position: absolute; right: 8px;
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: #666; padding: 6px;
      line-height: 1;
    }

    .hint {
      margin-top: 6px; font-size: 11.5px;
      color: var(--gray-3); display: flex; align-items: center; gap: 5px;
    }
    .error-msg {
      margin-top: 6px; font-size: 12.5px;
      color: var(--red); font-weight: 500;
      display: none; align-items: center; gap: 5px;
    }
    .error-msg.show { display: flex; }

    /* ─── Remember me ───────────────────────────────── */
    .remember {
      display: flex; align-items: center; gap: 8px;
      margin: 4px 0 20px; font-size: 13px; color: var(--gray-4);
      cursor: pointer; user-select: none;
    }
    .remember input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--blue); }

    /* ─── Button ────────────────────────────────────── */
    .btn {
      width: 100%; padding: 15px;
      border: none; border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
    .btn-navy {
      background: var(--navy); color: var(--white);
      box-shadow: 0 4px 14px rgba(0,26,85,0.2);
    }
    .btn-navy:hover:not(:disabled) {
      background: #002580;
      box-shadow: 0 6px 20px rgba(0,26,85,0.28);
      transform: translateY(-1px);
    }

    /* ─── Spinner ───────────────────────────────────── */
    .spin {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: rotate 0.7s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    /* ─── Help ──────────────────────────────────────── */
    .help {
      margin-top: 22px; padding-top: 18px;
      border-top: 1px solid var(--gray-2);
      text-align: center;
    }
    .help p { font-size: 12px; color: var(--gray-3); line-height: 1.7; }
    .help a { color: var(--green); font-weight: 600; text-decoration: none; }

    /* ─── Footer ────────────────────────────────────── */
    .card-footer {
      text-align: center; padding: 0 32px 22px;
      font-size: 11px; color: var(--gray-3);
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Header -->
  <div class="card-header">
    <div class="logo-mark">✝</div>
    <h1>Catholizare Pro</h1>
    <p>Sistema de admisiones y evaluación</p>
  </div>

  <!-- Body -->
  <div class="card-body">
    <div class="field">
      <label for="tokenAdmin">PIN de acceso</label>
      <div class="input-wrap">
        <input
          id="tokenAdmin"
          type="password"
          placeholder="••••••••••••"
          autocomplete="off"
          maxlength="60"
        >
        <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePassword()" title="Mostrar / ocultar">👁</button>
      </div>
      <div class="hint">🔐 PIN configurado por coordinación</div>
      <div class="error-msg" id="errAdmin">PIN inválido o sin permisos.</div>
    </div>

    <label class="remember">
      <input type="checkbox" id="rememberPin">
      Recordar mi contraseña en este equipo
    </label>

    <button class="btn btn-navy" id="btnAdmin" onclick="enterAdmin()">
      Entrar al sistema <span>→</span>
    </button>

    <!-- Help -->
    <div class="help">
      <p>¿Problemas para acceder?
        <a href="https://wa.me/5215510223883?text=Hola%2C+necesito+ayuda+para+acceder+al+sistema+de+Catholizare+Pro" target="_blank">Ayuda por WhatsApp</a>
      </p>
    </div>
  </div>

  <div class="card-footer">© 2026 Catholizare Pro · Todos los derechos reservados</div>
</div>

<script>
  const API_BASE = 'https://profesionales.catholizare.com/catholizare_sistem/proxy.php';
  const REMEMBER_KEY = 'rememberedAdminPin';

  const inp = document.getElementById('tokenAdmin');

  // ── Admin login ───────────────────────────────────
  async function enterAdmin() {
    clearError();
    const token = inp.value.trim();

    if (!token || token.length < 6) {
      inp.classList.add('is-error');
      document.getElementById('errAdmin').textContent = 'Ingresa un PIN válido.';
      document.getElementById('errAdmin').classList.add('show');
      return;
    }

    const btn = document.getElementById('btnAdmin');
    btn.disabled = true;
    btn.innerHTML = '<div class="spin"></div> Verificando...';

    try {
      const resp = await fetch(API_BASE, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ action: 'adminLogin', pin: token })
      });
      const data = await resp.json();

      if (data.success) {
        // Guardar "recordar contraseña" si corresponde
        if (document.getElementById('rememberPin').checked) {
          try { localStorage.setItem(REMEMBER_KEY, btoa(token)); } catch (e) {}
        } else {
          localStorage.removeItem(REMEMBER_KEY);
        }
        // El token NO se expone en la URL: viaja por sessionStorage (misma pestaña).
        sessionStorage.setItem('adminToken', token);
        btn.innerHTML = '✓ Acceso concedido';
        setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 350);
      } else {
        showError(data.message || 'PIN inválido');
        btn.disabled = false;
        btn.innerHTML = 'Entrar al sistema <span>→</span>';
      }
    } catch (e) {
      showError('Error de conexión. Intenta de nuevo.');
      btn.disabled = false;
      btn.innerHTML = 'Entrar al sistema <span>→</span>';
    }
  }

  function togglePassword() {
    const btn = document.getElementById('eyeBtn');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else                        { inp.type = 'password'; btn.textContent = '👁'; }
  }

  function showError(msg) {
    inp.classList.add('is-error');
    const el = document.getElementById('errAdmin');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearError() {
    inp.classList.remove('is-error');
    document.getElementById('errAdmin').classList.remove('show');
  }

  // Enter para enviar; limpiar error al escribir
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') enterAdmin(); });
  inp.addEventListener('input', clearError);

  // ── Prefill "recordar contraseña" ─────────────────
  (function () {
    try {
      const saved = localStorage.getItem(REMEMBER_KEY);
      if (saved) {
        inp.value = atob(saved);
        document.getElementById('rememberPin').checked = true;
      }
    } catch (e) {}
    inp.focus();
  })();
</script>
</body>
</html>
