<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información general sobre la Red Catholizare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #001A55;
            --primary-light: #0966FF;
            --success: #4CAF50;
            --danger: #f44336;
            --light: #f5f7fa;
            --border-color: #e0e0e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--light); color: #333; line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white; padding: 2rem; text-align: center;
            box-shadow: 0 4px 12px rgba(0, 26, 85, 0.15);
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .header p { opacity: 0.9; font-size: 1.05em; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .terms-content {
            background: white; padding: 2rem; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); margin-bottom: 2rem;
        }
        .terms-content h2 {
            color: var(--primary); font-size: 1.3em; margin-top: 2rem;
            margin-bottom: 1rem; padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-light);
        }
        .terms-content h2:first-child { margin-top: 0; }
        .terms-content h3 { color: var(--primary); font-size: 1.1em; margin-top: 1.5rem; margin-bottom: 0.8rem; }
        .terms-content p  { margin-bottom: 1rem; text-align: justify; }
        .terms-content ul, .terms-content ol { margin-left: 2rem; margin-bottom: 1rem; }
        .terms-content li { margin-bottom: 0.5rem; }
        .loading-state { text-align: center; padding: 2rem; color: #999; font-style: italic; }
        .acceptance-section {
            background: white; padding: 2rem; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); margin-bottom: 2rem;
            border: 2px solid var(--primary-light);
        }
        .acceptance-section h2 { color: var(--primary); margin-top: 0; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 1rem; }
        .checkbox-group input[type="checkbox"] {
            width: 24px; height: 24px; margin-top: 2px; cursor: pointer;
            accent-color: var(--primary-light); flex-shrink: 0;
        }
        .checkbox-group label { cursor: pointer; font-size: 0.95em; }
        .checkbox-group label strong { color: var(--primary); }
        .checkbox-group label a { color: var(--primary-light); font-weight: 600; text-decoration: underline; }
        .message {
            padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none;
        }
        .message.error   { background: #FFEBEE; color: #B71C1C; border-left: 4px solid var(--danger); }
        .message.success { background: #E8F5E9; color: #1B5E20; border-left: 4px solid var(--success); }
        .message.show    { display: block; }
        .button-group { display: flex; gap: 1rem; margin-top: 2rem; }
        button {
            flex: 1; padding: 1rem; border: none; border-radius: 8px;
            font-size: 1em; font-weight: 600; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-continuar { background: var(--success); color: white; }
        .btn-continuar:hover:not(:disabled) {
            background: #45a049; transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer {
            text-align: center; color: #999; font-size: 0.85em;
            margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border-color);
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.4rem; }
            .container { padding: 0 1rem; }
            .terms-content, .acceptance-section { padding: 1.5rem; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Información general sobre la Red Catholizare</h1>
        <p>Por favor revisa esta información antes de continuar con tu proceso</p>
    </div>

    <div class="container">
        <div class="terms-content" id="termsContent">
            <div class="loading-state" id="loadingState">Cargando información…</div>
        </div>

        <div class="acceptance-section">
            <h2>Aceptación para continuar</h2>
            <div class="message error"   id="errorMessage"></div>
            <div class="message success" id="successMessage"></div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="acceptTC">
                    <label for="acceptTC">
                        He leído y <strong>ACEPTO</strong> los
                        <a href="https://catholizare.com/terminos-y-condiciones-postulantes/" target="_blank" rel="noopener">
                            Términos y Condiciones para postulantes
                        </a>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="acceptPrivacy">
                    <label for="acceptPrivacy">
                        He leído y <strong>ACEPTO</strong> el
                        <a href="https://catholizare.com/aviso-privacidad/" target="_blank" rel="noopener">
                            Aviso de Privacidad
                        </a>
                    </label>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-continuar" id="continuarBtn" onclick="aceptarYContinuar()" disabled>
                    Continuar →
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Catholizare.com — Red de profesionales católicos</p>
    </div>

    <script>
        const urlParams   = new URLSearchParams(window.location.search);
        const candidateId = urlParams.get('candidate_id');
        const email       = urlParams.get('email');
        const token       = urlParams.get('token');

        const API_BASE = 'https://profesionales.catholizare.com/catholizare_sistem/proxy.php';

        // ─── Cargar contenido desde la pestaña `terminos` del Spreadsheet ───
        async function loadTermsContent() {
            const container = document.getElementById('termsContent');
            try {
                const resp = await fetch(`${API_BASE}?action=get_terms_content`);
                const json = await resp.json();
                if (json && json.success && json.data && json.data.html) {
                    container.innerHTML = json.data.html;
                } else {
                    container.innerHTML =
                        '<p style="color:#B71C1C;">No se pudo cargar la información en este momento. ' +
                        'Por favor intenta recargar la página.</p>';
                }
            } catch (err) {
                container.innerHTML =
                    '<p style="color:#B71C1C;">Error al cargar la información: ' + err.message + '</p>';
            }
        }

        // ─── Habilitar botón "Continuar" sólo cuando ambos checkboxes están marcados ───
        function refreshContinuarBtn() {
            const tc   = document.getElementById('acceptTC').checked;
            const priv = document.getElementById('acceptPrivacy').checked;
            document.getElementById('continuarBtn').disabled = !(tc && priv);
        }
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', refreshContinuarBtn);
        });

        // ─── Aceptar y continuar ───
        async function aceptarYContinuar() {
            const tc   = document.getElementById('acceptTC').checked;
            const priv = document.getElementById('acceptPrivacy').checked;
            if (!tc || !priv) {
                showError('Debes aceptar los Términos y Condiciones y el Aviso de Privacidad para continuar');
                return;
            }
            if (!candidateId) {
                showError('ID de candidato no encontrado en la URL. Solicita un nuevo enlace.');
                return;
            }

            const btn = document.getElementById('continuarBtn');
            btn.disabled  = true;
            btn.innerHTML = '<span class="spinner"></span>Procesando…';

            try {
                const resp = await fetch(`${API_BASE}?action=acceptTerms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        candidate_id: candidateId,
                        email:        email,
                        token:        token,
                        accepted_at:  new Date().toISOString(),
                        user_agent:   navigator.userAgent,
                        tc_postulantes_accepted:   true,
                        aviso_privacidad_accepted: true
                    })
                });
                const result = await resp.json();
                if (result.success) {
                    showSuccess('¡Información aceptada! Te enviamos el acceso al Examen E2 por correo. Redirigiendo…');
                    setTimeout(() => {
                        window.location.href = 'https://catholizare.com/ciencia-y-fe-para-la-vida-real/';
                    }, 2500);
                } else {
                    showError(result.message || 'Error al registrar la aceptación');
                    btn.disabled  = false;
                    btn.innerHTML = 'Continuar →';
                }
            } catch (error) {
                showError('Error de conexión: ' + error.message);
                btn.disabled  = false;
                btn.innerHTML = 'Continuar →';
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg; el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 6000);
        }
        function showSuccess(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = msg; el.classList.add('show');
        }

        window.addEventListener('load', () => {
            window.scrollTo(0, 0);
            loadTermsContent();
        });
    </script>
</body>
</html>
