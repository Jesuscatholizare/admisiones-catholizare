<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Términos y Condiciones - RCCC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #001A55;
            --primary-light: #0966FF;
            --success: #4CAF50;
            --danger: #f44336;
            --light: #f5f7fa;
            --border-color: #e0e0e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--light);
            color: #333;
            line-height: 1.6;
        }
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 12px rgba(0, 26, 85, 0.15);
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .header p {
            opacity: 0.9;
            font-size: 1.05em;
        }
        /* Container */
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        /* Content */
        .terms-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 2rem;
        }
        .terms-content h2 {
            color: var(--primary);
            font-size: 1.3em;
            margin-top: 2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-light);
        }
        .terms-content h2:first-child {
            margin-top: 0;
        }
        .terms-content h3 {
            color: var(--primary);
            font-size: 1.1em;
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
        }
        .terms-content p {
            margin-bottom: 1rem;
            text-align: justify;
        }
        .terms-content ul,
        .terms-content ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }
        .terms-content li {
            margin-bottom: 0.5rem;
        }
        .highlight {
            background: #fffacd;
            padding: 1rem;
            border-left: 4px solid var(--primary-light);
            border-radius: 6px;
            margin: 1rem 0;
        }
        /* Acceptance Section */
        .acceptance-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 2rem;
            border: 2px solid var(--primary-light);
        }
        .acceptance-section h2 {
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }
        .checkbox-group input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--primary-light);
            flex-shrink: 0;
        }
        .checkbox-group label {
            cursor: pointer;
            font-size: 0.95em;
        }
        .checkbox-group label strong {
            color: var(--primary);
        }
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
        }
        .message.error {
            background: #FFEBEE;
            color: #B71C1C;
            border-left: 4px solid var(--danger);
        }
        .message.success {
            background: #E8F5E9;
            color: #1B5E20;
            border-left: 4px solid var(--success);
        }
        .message.show {
            display: block;
        }
        /* Buttons */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-accept {
            background: var(--success);
            color: white;
        }
        .btn-accept:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        .btn-decline {
            background: #e0e0e0;
            color: var(--primary);
        }
        .btn-decline:hover:not(:disabled) {
            background: #d0d0d0;
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .container {
                padding: 0 1rem;
            }
            .terms-content,
            .acceptance-section {
                padding: 1.5rem;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>Términos y Condiciones</h1>
        <p>Red de Psicólogos Católicos (RCCC)</p>
    </div>
    <!-- Main Content -->
    <div class="container">
        <div class="terms-content" id="termsContent">
            <!-- Contenido cargado dinámicamente desde la hoja "Terminos" de la Spreadsheet -->
            <div id="termsLoading" style="text-align:center;padding:2rem;color:#666;">
                <span class="spinner" style="border-top-color:#0966FF;border-color:rgba(9,102,255,.2);display:inline-block;margin-right:8px;"></span>
                Cargando términos...
            </div>
        </div>
        <!-- Acceptance Form -->
        <div class="acceptance-section">
            <h2>Aceptar Términos y Condiciones</h2>
            <div class="message error" id="errorMessage"></div>
            <div class="message success" id="successMessage"></div>
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="acceptTerms" required>
                    <label for="acceptTerms">
                        He leído y <strong>ACEPTO</strong> los Términos y Condiciones
                    </label>
                </div>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="acceptPrivacy" required>
                    <label for="acceptPrivacy">
                        Acepto que mis datos sean tratados conforme a la <strong>Política de Privacidad</strong>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="acceptAI" required>
                    <label for="acceptAI">
                        Acepto que mis respuestas sean evaluadas con <strong>asistencia de Inteligencia Artificial</strong>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="acceptAntifraud" required>
                    <label for="acceptAntifraud">
                        Entiendo y acepto las <strong>medidas de seguridad anti-fraude</strong> (copy-paste blocking, blur detection, etc)
                    </label>
                </div>
            </div>
            <div class="button-group">
                <button class="btn-decline" onclick="declineTerms()">
                    ← Declinar
                </button>
                <button class="btn-accept" id="acceptButton" onclick="acceptTerms()">
                    ✓ Aceptar y Continuar
                </button>
            </div>
        </div>
    </div>
    <!-- Footer -->
    <div class="footer">
        <p>
            © 2026 Red de Psicólogos Católicos (RCCC). Todos los derechos reservados.<br>
            <a href="https://rccc.org/privacidad" target="_blank" style="color: var(--primary-light);">Política de Privacidad</a> |
            <a href="https://rccc.org/contacto" target="_blank" style="color: var(--primary-light);">Contacto</a>
        </p>
    </div>
    <script>
        // Obtener parámetros de URL
        const urlParams = new URLSearchParams(window.location.search);
        const candidateId = urlParams.get('candidate_id');
        const email = urlParams.get('email');
        const token = urlParams.get('token');

        // TODO: Reemplazar con la URL real de tu servidor
        const API_BASE = 'https://profesionales.catholizare.com/catholizare_sistem/proxy.php';

        // Aceptar términos
        async function acceptTerms() {
            if (!document.getElementById('acceptTerms').checked ||
                !document.getElementById('acceptPrivacy').checked ||
                !document.getElementById('acceptAI').checked ||
                !document.getElementById('acceptAntifraud').checked) {
                showError('Debes aceptar todos los términos para continuar');
                return;
            }
            if (!candidateId) {
                showError('ID de candidato no encontrado. Por favor intenta nuevamente.');
                return;
            }
            const button = document.getElementById('acceptButton');
            button.disabled = true;
            button.innerHTML = '<span class="spinner"></span>Procesando...';
            try {
                const response = await fetch(`${API_BASE}?action=acceptTerms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        candidate_id: candidateId,
                        email: email,
                        token: token,
                        accepted_at: new Date().toISOString(),
                        user_agent: navigator.userAgent
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showSuccess('¡Términos aceptados! Redirigiendo...');
                    setTimeout(() => {
                        window.location.href = 'https://catholizare.com/ciencia-y-fe-para-la-vida-real/';
                    }, 2000);
                } else {
                    showError(result.message || 'Error al aceptar términos');
                    button.disabled = false;
                    button.innerHTML = '✓ Aceptar y Continuar';
                }
            } catch (error) {
                showError('Error de conexión: ' + error.message);
                button.disabled = false;
                button.innerHTML = '✓ Aceptar y Continuar';
            }
        }

        // Declinar términos
        function declineTerms() {
            if (confirm('¿Deseas declinar los términos y cancelar tu participación?')) {
                window.location.href = '/';
            }
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.add('show');
        }

        /* ── Cargar términos desde la hoja "Terminos" de la Spreadsheet ── */
        async function loadTerminos() {
            const container = document.getElementById('termsContent');
            try {
                const res  = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getTerminos' })
                });
                const data = await res.json();
                if (!data.success || !data.rows || data.rows.length === 0) throw new Error('sin_contenido');

                let html = '';
                let inList = false;
                data.rows.forEach(({ tipo, contenido }) => {
                    if (tipo !== 'item' && inList) { html += '</ul>'; inList = false; }
                    switch (tipo) {
                        case 'titulo':
                            html += `<h2>${esc(contenido)}</h2>`;
                            break;
                        case 'subtitulo':
                            html += `<h3>${esc(contenido)}</h3>`;
                            break;
                        case 'parrafo':
                            html += `<p>${esc(contenido)}</p>`;
                            break;
                        case 'item':
                            if (!inList) { html += '<ul>'; inList = true; }
                            html += `<li>${esc(contenido)}</li>`;
                            break;
                        case 'destacado':
                            html += `<div class="highlight"><strong>Importante:</strong> ${esc(contenido)}</div>`;
                            break;
                    }
                });
                if (inList) html += '</ul>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<p style="color:#b91c1c;text-align:center;">No se pudo cargar el contenido. Por favor recarga la página.</p>';
            }
        }

        function esc(str) {
            return String(str)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
        }

        window.addEventListener('load', () => { window.scrollTo(0, 0); loadTerminos(); });

        // Habilitar botón solo cuando todos los checkboxes están marcados
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const allChecked =
                    document.getElementById('acceptTerms').checked &&
                    document.getElementById('acceptPrivacy').checked &&
                    document.getElementById('acceptAI').checked &&
                    document.getElementById('acceptAntifraud').checked;
                document.getElementById('acceptButton').disabled = !allChecked;
            });
        });

        // Botón deshabilitado al inicio
        document.getElementById('acceptButton').disabled = true;
    </script>
</body>
</html>
