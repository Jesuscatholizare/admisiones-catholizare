<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando examen...</title>
  <style>
    body { margin: 0; background: #001A55; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
    .loader { text-align: center; color: white; }
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 15px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Cargando examen...</p>
  </div>
  <script>
    // Redirige a exam-webapp.html preservando todos los parámetros de la URL
    window.location.replace('../exam-webapp.html' + window.location.search + window.location.hash);
  </script>
</body>
</html>
